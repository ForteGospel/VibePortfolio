name: Deploy Index Only

on:
  push:
    branches: ["main"] # Change to master if your branch is named master
  workflow_dispatch:   # Allows you to trigger this manually

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      # Create a clean temporary directory containing ONLY index.html
      - name: Isolate Index File
        run: |
          mkdir public-dist
          cp index.html public-dist/

      - name: Upload Page Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./public-dist # Uploads only the folder containing index.html

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
