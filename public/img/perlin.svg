<svg viewBox="0 0 320 180" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#060d14"/>
      <stop offset="100%" stop-color="#0a1a10"/>
    </linearGradient>
    <linearGradient id="ground" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a3a20"/>
      <stop offset="100%" stop-color="#0a1a0d"/>
    </linearGradient>
  </defs>
  <rect width="320" height="180" fill="url(#sky)"/>

  <!-- stars -->
  <circle cx="30"  cy="18" r="1.2" fill="#fff" opacity="0.5"/>
  <circle cx="80"  cy="10" r="1"   fill="#fff" opacity="0.4"/>
  <circle cx="140" cy="22" r="1.5" fill="#fff" opacity="0.6"/>
  <circle cx="200" cy="8"  r="1"   fill="#fff" opacity="0.45"/>
  <circle cx="260" cy="20" r="1.2" fill="#fff" opacity="0.5"/>
  <circle cx="300" cy="12" r="1"   fill="#fff" opacity="0.35"/>
  <circle cx="55"  cy="35" r="0.8" fill="#fff" opacity="0.3"/>
  <circle cx="175" cy="40" r="1"   fill="#fff" opacity="0.4"/>
  <circle cx="240" cy="32" r="0.8" fill="#fff" opacity="0.3"/>

  <!-- procedural terrain silhouette (back layer) -->
  <path d="M0,120 C20,95 40,85 60,90 C80,95 90,70 110,72 C130,74 145,88 160,80
           C175,72 190,60 210,68 C230,76 245,82 260,75 C275,68 290,80 320,78 L320,180 L0,180 Z"
        fill="#112918" opacity="0.9"/>

  <!-- terrain highlight (front layer, with grid-like edges for procedural feel) -->
  <path d="M0,135 C10,125 18,118 28,120 C38,122 44,108 52,105
           C60,102 65,112 75,108 C85,104 90,96 100,98
           C110,100 118,110 128,105 C138,100 143,90 155,92
           C167,94 172,102 182,98 C192,94 198,85 210,88
           C222,91 228,100 240,96 C252,92 260,84 272,88
           C284,92 295,105 310,102 L320,100 L320,180 L0,180 Z"
        fill="url(#ground)"/>

  <!-- grid overlay (procedural feel) -->
  <g opacity="0.08" stroke="#22d3ee" stroke-width="0.5">
    <line x1="0"   y1="60"  x2="320" y2="60"/>
    <line x1="0"   y1="90"  x2="320" y2="90"/>
    <line x1="0"   y1="120" x2="320" y2="120"/>
    <line x1="64"  y1="0"   x2="64"  y2="180"/>
    <line x1="128" y1="0"   x2="128" y2="180"/>
    <line x1="192" y1="0"   x2="192" y2="180"/>
    <line x1="256" y1="0"   x2="256" y2="180"/>
  </g>

  <!-- player character (simple pixel) -->
  <rect x="148" y="85" width="8"  height="8"  fill="#22d3ee" opacity="0.9"/>
  <rect x="146" y="93" width="12" height="6"  fill="#22d3ee" opacity="0.9"/>
  <rect x="146" y="99" width="5"  height="4"  fill="#22d3ee" opacity="0.7"/>
  <rect x="153" y="99" width="5"  height="4"  fill="#22d3ee" opacity="0.7"/>

  <!-- label -->
  <text x="160" y="170" font-family="monospace" font-size="10" fill="#22d3ee" text-anchor="middle" opacity="0.5">Perlin Noise Platformer</text>
</svg>
