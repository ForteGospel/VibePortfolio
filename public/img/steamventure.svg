<svg viewBox="0 0 320 180" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="bg" cx="50%" cy="60%" r="70%">
      <stop offset="0%" stop-color="#2a1a06"/>
      <stop offset="100%" stop-color="#0d0a04"/>
    </radialGradient>
  </defs>
  <rect width="320" height="180" fill="url(#bg)"/>

  <!-- pipes -->
  <rect x="10"  y="110" width="90" height="10" rx="5" fill="#6b4a10"/>
  <rect x="90"  y="65"  width="10" height="55" rx="5" fill="#6b4a10"/>
  <rect x="200" y="118" width="110" height="10" rx="5" fill="#6b4a10"/>
  <rect x="200" y="70"  width="10" height="58" rx="5" fill="#6b4a10"/>

  <!-- steam -->
  <circle cx="95"  cy="55" r="9"  fill="#aaa" opacity="0.18"/>
  <circle cx="106" cy="44" r="7"  fill="#aaa" opacity="0.13"/>
  <circle cx="84"  cy="40" r="6"  fill="#aaa" opacity="0.10"/>
  <circle cx="205" cy="60" r="9"  fill="#aaa" opacity="0.18"/>
  <circle cx="216" cy="50" r="7"  fill="#aaa" opacity="0.13"/>

  <!-- large gear centre -->
  <g transform="translate(160,92)">
    <circle r="42" fill="none" stroke="#b07820" stroke-width="3.5"/>
    <circle r="28" fill="none" stroke="#b07820" stroke-width="2"/>
    <circle r="8"  fill="#b07820"/>
    <!-- 8 teeth -->
    <rect x="-6" y="-50" width="12" height="14" rx="2" fill="#b07820"/>
    <rect x="-6" y="36"  width="12" height="14" rx="2" fill="#b07820"/>
    <rect x="36" y="-6"  width="14" height="12" rx="2" fill="#b07820"/>
    <rect x="-50" y="-6" width="14" height="12" rx="2" fill="#b07820"/>
    <g transform="rotate(45)">
      <rect x="-6" y="-50" width="12" height="14" rx="2" fill="#b07820"/>
      <rect x="-6" y="36"  width="12" height="14" rx="2" fill="#b07820"/>
      <rect x="36" y="-6"  width="14" height="12" rx="2" fill="#b07820"/>
      <rect x="-50" y="-6" width="14" height="12" rx="2" fill="#b07820"/>
    </g>
    <!-- spokes -->
    <line x1="0" y1="-28" x2="0"  y2="28"  stroke="#b07820" stroke-width="2"/>
    <line x1="-28" y1="0" x2="28" y2="0"   stroke="#b07820" stroke-width="2"/>
  </g>

  <!-- small gear top-left -->
  <g transform="translate(50,65)">
    <circle r="20" fill="none" stroke="#8a5e14" stroke-width="2.5"/>
    <circle r="13" fill="none" stroke="#8a5e14" stroke-width="1.5"/>
    <circle r="5"  fill="#8a5e14"/>
    <rect x="-4" y="-24" width="8" height="10" rx="1.5" fill="#8a5e14"/>
    <rect x="-4" y="14"  width="8" height="10" rx="1.5" fill="#8a5e14"/>
    <rect x="14" y="-4"  width="10" height="8" rx="1.5" fill="#8a5e14"/>
    <rect x="-24" y="-4" width="10" height="8" rx="1.5" fill="#8a5e14"/>
    <g transform="rotate(45)">
      <rect x="-4" y="-24" width="8" height="10" rx="1.5" fill="#8a5e14"/>
      <rect x="-4" y="14"  width="8" height="10" rx="1.5" fill="#8a5e14"/>
      <rect x="14" y="-4"  width="10" height="8" rx="1.5" fill="#8a5e14"/>
      <rect x="-24" y="-4" width="10" height="8" rx="1.5" fill="#8a5e14"/>
    </g>
  </g>

  <!-- small gear top-right -->
  <g transform="translate(268,58)">
    <circle r="18" fill="none" stroke="#8a5e14" stroke-width="2"/>
    <circle r="11" fill="none" stroke="#8a5e14" stroke-width="1.5"/>
    <circle r="4"  fill="#8a5e14"/>
    <rect x="-4" y="-22" width="8" height="9" rx="1.5" fill="#8a5e14"/>
    <rect x="-4" y="13"  width="8" height="9" rx="1.5" fill="#8a5e14"/>
    <rect x="13" y="-4"  width="9" height="8" rx="1.5" fill="#8a5e14"/>
    <rect x="-22" y="-4" width="9" height="8" rx="1.5" fill="#8a5e14"/>
    <g transform="rotate(45)">
      <rect x="-4" y="-22" width="8" height="9" rx="1.5" fill="#8a5e14"/>
      <rect x="-4" y="13"  width="8" height="9" rx="1.5" fill="#8a5e14"/>
      <rect x="13" y="-4"  width="9" height="8" rx="1.5" fill="#8a5e14"/>
      <rect x="-22" y="-4" width="9" height="8" rx="1.5" fill="#8a5e14"/>
    </g>
  </g>

  <!-- label -->
  <text x="160" y="170" font-family="monospace" font-size="10" fill="#b07820" text-anchor="middle" opacity="0.6">SteamVenture</text>
</svg>
